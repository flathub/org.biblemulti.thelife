app-id: org.biblemulti.thelife
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: biblemultithelife
separate-locales: false
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --device=dri
modules:
  - name: libkeybinder
    buildsystem: autotools
    config-opts:
       - --disable-introspection
    sources:
       - type: archive
         url: https://github.com/kupferlauncher/keybinder/releases/download/keybinder-3.0-v0.3.2/keybinder-3.0-0.3.2.tar.gz
         sha256: e6e3de4e1f3b201814a956ab8f16dfc8a262db1937ff1eee4d855365398c6020
  - name: biblemultithelife
    buildsystem: simple
    build-commands:
       - mkdir -p /app
       - tar -xf biblemultithelife.tar.gz -C /app
       - mkdir -p /app/bin
       - ln -s /app/biblemultithelife /app/bin/biblemultithelife
       - |
         arch=$(uname -m)
         if [ "$arch" = "x86_64" ]; then
           ln -s /usr/lib/x86_64-linux-gnu/libsqlite3.so.0 /app/lib/libsqlite3.so
         elif [ "$arch" = "aarch64" ]; then
           ln -s /usr/lib/aarch64-linux-gnu/libsqlite3.so.0 /app/lib/libsqlite3.so
         fi
    sources:
       - type: file
         url: https://gitlab.com/-/project/17175284/uploads/e79c45de200e7fe21c800172d65268d3/biblemultithelife.tar.gz
         sha256: f2bf0d76603351c7ba67e61159cb282bac26a740adcced5fa281377e520262c0
         only-arches: [x86_64]
       - type: file
         url: https://gitlab.com/-/project/17175284/uploads/f429e6c2747e78216e572bc0b3b492cb/biblemultithelife.tar.gz
         sha256: 0cd259761b363cc12ab8cc99e59fbb921c1431d7298ed97793de47cf42bfae4c
         only-arches: [aarch64]
